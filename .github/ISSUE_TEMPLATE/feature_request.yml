name: ✨ 功能需求
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请详细描述你的需求，帮助我们更好地理解和评估。

  - type: textarea
    id: problem
    attributes:
      label: 需求背景
      description: 这个功能是为了解决什么问题？或者满足什么使用场景？
      placeholder: 我在使用时遇到了 ... 希望能够 ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 描述你希望实现的功能或行为。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 你是否考虑过其他实现方式？

  - type: dropdown
    id: priority
    attributes:
      label: 优先级（你认为）
      options:
        - 低 - 锦上添花
        - 中 - 比较有用
        - 高 - 强烈需要
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索过现有 issue，确认此需求未被提出过
          required: true
